    * { box-sizing: border-box; }
    /* Tame the inner scroll inside artboards */
    .lp-scroll { scrollbar-width: thin; scrollbar-color: rgba(0,0,0,.15) transparent; }
    .lp-scroll::-webkit-scrollbar { width: 8px; }
    .lp-scroll::-webkit-scrollbar-thumb { background: rgba(0,0,0,.18); border-radius: 4px; }

      background-color: rgba(0,0,0,.04);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Geist Mono', ui-monospace, monospace;
      font-size: 11px; letter-spacing: .08em; text-transform: uppercase;
      color: rgba(0,0,0,.5);
    }
    .lp-ph.lp-ph-dark {
      background-image: repeating-linear-gradient(135deg,
        rgba(255,255,255,.07) 0 1px, transparent 1px 14px);
      background-color: rgba(255,255,255,.03);
      color: rgba(255,255,255,.5);
    }
    /* Hide focus rings on contenteditable false defaults — only show when needed */
    button:focus-visible, a:focus-visible, input:focus-visible, textarea:focus-visible {
      outline: 2px solid currentColor; outline-offset: 2px;
    }
